<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCTIERS - Cross-Platform Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&family=Inter:wght=400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(120% 120% at 50% 0%, #0d1326 0%, #04060a 100%);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #f3f4f6; 
            padding-bottom: 60px; 
            overflow-x: hidden; 
        }
        
        /* Smooth Cascade Bar Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px) scale(0.99); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-tier-bar {
            animation: fadeInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        /* Premium Floating Tab Layout */
        .tab-item { transition: all 0.3s cubic-bezier(0.25, 1, 0.2, 1); white-space: nowrap; flex-shrink: 0; cursor: pointer; }
        .tab-item.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            color: #ffffff; 
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        /* Custom Geometric Rank Boxes */
        .rank-box {
            width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; 
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.2rem; border-radius: 16px;
        }
        
        /* Ultra Visual Tier Lighting Configurations */
        .card-top-1 { 
            background: linear-gradient(135deg, rgba(250, 204, 21, 0.08) 0%, rgba(13, 20, 38, 0.15) 100%); 
            border: 1px solid rgba(250, 204, 21, 0.35) !important;
            box-shadow: inset 0 1px 2px rgba(250, 204, 21, 0.2), 0 0 30px rgba(234, 179, 8, 0.03);
        }
        .card-top-1:hover { box-shadow: 0 25px 50px -10px rgba(234, 179, 8, 0.3), inset 0 1px 2px rgba(250, 204, 21, 0.3); }
        .card-top-1 .rank-box { background: linear-gradient(135deg, #fff3b3, #eab308); color: #431407; box-shadow: 0 6px 20px rgba(234, 179, 8, 0.45); }
        .card-top-1 .pts-pill { background: rgba(234, 179, 8, 0.12); border-color: rgba(234, 179, 8, 0.4); color: #fde047; }

        .card-top-2 { 
            background: linear-gradient(135deg, rgba(148, 163, 184, 0.07) 0%, rgba(13, 20, 38, 0.15) 100%); 
            border: 1px solid rgba(148, 163, 184, 0.35) !important;
            box-shadow: inset 0 1px 2px rgba(241, 245, 249, 0.15);
        }
        .card-top-2:hover { box-shadow: 0 25px 50px -10px rgba(148, 163, 184, 0.22); }
        .card-top-2 .rank-box { background: linear-gradient(135deg, #ffffff, #94a3b8); color: #0f172a; box-shadow: 0 6px 20px rgba(148, 163, 184, 0.3); }
        .card-top-2 .pts-pill { background: rgba(148, 163, 184, 0.12); border-color: rgba(148, 163, 184, 0.4); color: #cbd5e1; }

        .card-top-3 { 
            background: linear-gradient(135deg, rgba(255, 94, 0, 0.14) 0%, rgba(13, 20, 38, 0.2) 100%); 
            border: 1px solid rgba(255, 107, 0, 0.6) !important;
            box-shadow: inset 0 1px 2px rgba(255, 107, 0, 0.25), 0 0 30px rgba(255, 94, 0, 0.05);
        }
        .card-top-3:hover { box-shadow: 0 25px 50px -10px rgba(255, 94, 0, 0.35), inset 0 1px 2px rgba(255, 107, 0, 0.4); }
        .card-top-3 .rank-box { background: linear-gradient(135deg, #ffedd5, #ff5500); color: #ffffff; box-shadow: 0 6px 20px rgba(255, 68, 0, 0.55); }
        .card-top-3 .pts-pill { background: rgba(255, 94, 0, 0.18); border-color: rgba(255, 107, 0, 0.5); color: #ffbe94; }

        /* Premium Glass Card Layout Styles */
        .mctiers-card { 
            background: rgba(15, 23, 42, 0.45); 
            backdrop-filter: blur(24px); 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            cursor: pointer; 
        }
        .mctiers-card:hover {
            transform: scale(1.015) translateY(-2px);
            background: rgba(22, 34, 64, 0.6);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.75), 0 0 30px rgba(59, 130, 246, 0.1);
        }

        /* Tactically Segmented Capsule Grids */
        .tier-capsule {
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px 12px; border-radius: 14px; min-width: 62px; 
            background: rgba(4, 6, 11, 0.7); border: 1px solid;
            transition: all 0.25s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .tier-capsule:hover { background: rgba(4, 6, 11, 0.95); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
        
        /* UPGRADED: High Skill Radiance for Tier 1 & Tier 2 */
        .t1-theme { 
            border-color: rgba(234, 179, 8, 0.75) !important; 
            color: #fde047 !important; 
            box-shadow: inset 0 0 12px rgba(234, 179, 8, 0.25) !important; 
        }
        .t2-theme { 
            border-color: rgba(203, 213, 225, 0.7) !important; 
            color: #e2e8f0 !important; 
            box-shadow: inset 0 0 12px rgba(148, 163, 184, 0.2) !important; 
        }
        
        /* Saturated Orange Theme for Tier 3 */
        .t3-theme { 
            border-color: rgba(255, 107, 0, 0.75) !important; 
            color: #ff8c3a !important; 
            box-shadow: inset 0 0 12px rgba(249, 115, 22, 0.25) !important; 
        }
        
        .t4-theme { border-color: rgba(71, 85, 105, 0.5); color: #94a3b8; }
        .t5-theme { border-color: rgba(51, 65, 85, 0.5); color: #64748b; }

        /* Unified Overlay Backdrop Logic */
        .universal-modal { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            align-items: center; justify-content: center; padding: 16px; 
            backdrop-filter: blur(0px); background: rgba(1, 2, 4, 0);
            transition: backdrop-filter 0.4s ease, background-color 0.4s ease;
        }
        .universal-modal.modal-visible {
            backdrop-filter: blur(32px); background: rgba(1, 2, 4, 0.85);
        }

        .modal-box { 
            background: #060912; border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 32px; 
            width: 100%; max-width: 420px; opacity: 0;
            transform: scale(0.9) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-out;
        }
        .universal-modal.modal-visible .modal-box { opacity: 1; transform: scale(1) translateY(0); }
        
        .modal-avatar-frame { width: 88px !important; height: 88px !important; object-fit: cover; }
        
        /* Adaptive Theme Glows */
        .modal-top-1, .desktop-top-1 { border: 1px solid rgba(250, 204, 21, 0.35) !important; }
        .modal-top-1 .modal-glow-source, .desktop-top-1 .modal-glow-source { background: radial-gradient(circle at top, rgba(234, 179, 8, 0.15) 0%, transparent 70%); }
        .modal-top-2, .desktop-top-2 { border: 1px solid rgba(148, 163, 184, 0.35) !important; }
        .modal-top-2 .modal-glow-source, .desktop-top-2 .modal-glow-source { background: radial-gradient(circle at top, rgba(148, 163, 184, 0.12) 0%, transparent 70%); }
        .modal-top-3, .desktop-top-3 { border: 1px solid rgba(255, 94, 0, 0.5) !important; }
        .modal-top-3 .modal-glow-source, .desktop-top-3 .modal-glow-source { background: radial-gradient(circle at top, rgba(255, 94, 0, 0.22) 0%, transparent 70%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        
        <!-- App Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white bg-clip-text bg-gradient-to-r from-white via-white to-slate-400">MCTIERS</h1>
                <p class="text-[10px] font-extrabold text-blue-500/80 uppercase tracking-widest mt-1.5 pl-0.5">Database Tracking System</p>
            </div>
            <button onclick="openOthersModal()" class="group flex items-center gap-2 bg-slate-900/90 hover:bg-blue-600 border border-white/[0.06] hover:border-blue-400 px-4 py-2 rounded-xl shadow-lg backdrop-blur transition-all duration-300 active:scale-95">
                <span class="text-[11px] font-black uppercase tracking-wider text-blue-400 group-hover:text-white">Others</span>
                <span class="text-[9px] text-slate-500 group-hover:text-blue-200">▼</span>
            </button>
        </div>

        <!-- Navigation Filter Deck -->
        <div class="tab-bar flex overflow-x-auto gap-2 mb-8 no-scrollbar p-2 bg-slate-950/90 backdrop-blur-xl border border-white/[0.05] rounded-2xl shadow-2xl">
            <div class="tab-item active px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('overall', this)">🏆 Overall</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('sword', this)">Sword</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('crystal', this)">Crystal</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('mace', this)">Mace</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('smp', this)">SMP</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('diapot', this)">Diapot</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('nethpot', this)">Nethpot</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('axe', this)">Axe</div>
            <div class="tab-item text-slate-400 hover:text-slate-200 px-5 py-2.5 rounded-xl text-xs font-bold" onclick="filterBy('uhc', this)">UHC</div>
        </div>

        <!-- Adaptive Grid System -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- LEFT COLUMN: Desktop Profile Frame -->
            <div class="hidden lg:block lg:col-span-4 sticky top-8">
                <div id="desktopProfileCard" class="bg-[#060912] border border-white/[0.07] rounded-3xl relative overflow-hidden p-1 shadow-2xl min-h-[500px] flex flex-col justify-center items-center text-center">
                    <div class="modal-glow-source absolute inset-0 pointer-events-none z-0"></div>
                    <div id="desktopProfileBody" class="relative z-10 w-full p-6">
                        <div class="text-slate-500 text-sm font-semibold tracking-wide">Select a combatant profile</div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Main Leaderboard Stream -->
            <div id="playerContainer" class="col-span-1 lg:col-span-8 space-y-4"></div>
        </div>
    </div>

    <!-- FLOATING WINDOW MODAL: Tier Points Ledger System -->
    <div id="othersModal" class="universal-modal" onclick="closeOthersModal()">
        <div class="modal-box relative shadow-2xl overflow-hidden border border-blue-500/30" onclick="event.stopPropagation()">
            <div class="absolute inset-0 bg-radial-gradient from-blue-500/10 to-transparent pointer-events-none"></div>
            
            <div class="p-6 border-b border-white/[0.06] flex items-center justify-between relative z-10 bg-slate-950/40">
                <div>
                    <h2 class="text-lg font-black text-white tracking-tight">Tier Matrix Ledger</h2>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-0.5">System Point Distributions</p>
                </div>
                <button onclick="closeOthersModal()" class="w-8 h-8 flex items-center justify-center bg-slate-900 border border-white/[0.08] rounded-xl text-slate-400 hover:text-white text-xs transition-all">✕</button>
            </div>

            <div class="p-6 space-y-3 max-h-[70vh] overflow-y-auto no-scrollbar relative z-10">
                <div class="grid grid-cols-2 gap-2" id="ledgerContainer"></div>
            </div>
            
            <div class="p-6 pt-0 relative z-10">
                <button onclick="closeOthersModal()" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 border border-white/[0.08] rounded-xl text-xs font-black uppercase tracking-widest text-slate-300 transition-all">Dismiss View</button>
            </div>
        </div>
    </div>

    <!-- MOBILE SCREEN ONLY: Profile Modal Overlap -->
    <div id="profileModal" class="universal-modal" onclick="closeProfile()">
        <div id="modalContainer" class="modal-box relative shadow-2xl" onclick="event.stopPropagation()">
            <div class="modal-glow-source absolute inset-0 pointer-events-none z-0"></div>
            <button onclick="closeProfile()" class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center bg-slate-900/80 backdrop-blur border border-white/[0.08] rounded-xl text-slate-400 hover:text-white text-xs z-30 transition-all">✕</button>
            <div id="modalBody" class="relative z-10"></div>
        </div>
    </div>

    <script>
        let currentFilter = 'overall';
        let selectedPlayerId = 1;
        const POINT_VALUES = { 'HT1': 65, 'LT1': 50, 'HT2': 40, 'LT2': 35, 'HT3': 20, 'LT3': 15, 'HT4': 10, 'LT4': 5, 'HT5': 3, 'LT5': 1 };
        const abbreviations = { sword: "SW", crystal: "CR", mace: "ME", smp: "SM", diapot: "DP", nethpot: "NP", axe: "AX", uhc: "UHC" };
        const fullNames = { sword: "Sword", crystal: "Crystal", mace: "Mace", smp: "SMP", diapot: "Diapot", nethpot: "Nethpot", axe: "Axe", uhc: "UHC" };

        const players = [
            { id: 1, name: "X1an_", title: "Combat Grandmaster", region: "Asia", pfp: "x1an.png", tiers: { sword: "HT1", crystal: "LT3", mace: "HT4", smp: "LT2", diapot: "LT2", nethpot: "HT4", axe: "LT3", uhc: "LT3" } },
            { id: 2, name: "ugood", title: "Average pros", region: "Asia", pfp: "ugood.png", tiers: { sword: "HT3", smp: "LT3", mace: "LT3" } },
            { id: 3, name: "aozora", title: "Sword carried", region: "Asia", pfp: "azkam.png", tiers: { sword: "LT4" } },
            { id: 4, name: "Nelllwkwkwk", title: "Top 1 wannabe", region: "Asia", pfp: "nael.png", tiers: { sword: "HT5", uhc: "LT5" } },
            { id: 5, name: "owllyarv", title: "Mace Specialist", region: "Asia", pfp: "owlly.png", tiers: { crystal: "HT5", mace: "LT4", sword: "HT5" } },
            { id: 6, name: "RTunez_is_GOAT", title: "Building main", region: "Asia", pfp: "rtunez.png", tiers: { sword: "LT5", uhc: "LT5", mace: "LT5", axe: "LT5" } },
            { id: 7, name: "KanYeWest_Glazer", title: "i can't do it", region:"Asia", pfp: "nizam.png", tiers: { sword: "LT5", uhc: "LT5", mace: "LT5", axe: "LT5", crystal: "LT5"} }
        ];

        function calculatePoints(tierList) { return Object.values(tierList).reduce((acc, tier) => acc + (POINT_VALUES[tier] || 0), 0); }

        function handleImgError(image) {
            image.onerror = null;
            image.src = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(image.dataset.name)}`;
        }

        function getTierIconHtml(mode, tier, isProfile = false, delayIndex = 0) {
            const level = tier.replace(/\D/g, '');
            const delayStyle = `style="animation-delay: ${delayIndex * 45}ms;"`;
            return `
            <div class="tier-capsule t${level}-theme animate-tier-bar" ${delayStyle}>
                <span class="text-[9px] font-bold opacity-45 tracking-widest">${abbreviations[mode]}</span>
                <span class="text-xs font-black mt-0.5 tracking-tight">${tier}</span>
                ${isProfile ? `<span class="text-[8px] opacity-40 font-bold mt-1.5 text-center truncate w-full tracking-wider uppercase">${fullNames[mode]}</span>` : ''}
            </div>`;
        }

        function buildLedger() {
            const ledger = document.getElementById('ledgerContainer');
            ledger.innerHTML = Object.entries(POINT_VALUES).map(([tier, pts]) => {
                const level = tier.replace(/\D/g, '');
                return `
                    <div class="bg-slate-950/60 border border-white/[0.04] p-3 rounded-xl flex items-center justify-between">
                        <span class="px-2.5 py-1 rounded-md text-[11px] font-black bg-slate-900 border border-white/[0.05] t${level}-theme">${tier}</span>
                        <span class="text-xs font-extrabold text-blue-400">${pts} <span class="text-[9px] opacity-50 text-white font-medium">PTS</span></span>
                    </div>
                `;
            }).join('');
        }

        function renderList() {
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';
            players.forEach(p => p.computedPts = calculatePoints(p.tiers));
            players.sort((a, b) => b.computedPts - a.computedPts);

            players.forEach((p, index) => {
                const rank = index + 1;
                let cardRankTheme = 'border-white/[0.04]';
                if (rank === 1) cardRankTheme = 'card-top-1';
                else if (rank === 2) cardRankTheme = 'card-top-2';
                else if (rank === 3) cardRankTheme = 'card-top-3';

                const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
                if (rank > 3) cardRankTheme += ' hover:shadow-[0_25px_50px_-15px_rgba(59,130,246,0.2)]';
                
                let TiersHtml = (currentFilter === 'overall') 
                    ? Object.entries(p.tiers).map(([m, t], i) => getTierIconHtml(m, t, false, i)).join('')
                    : (p.tiers[currentFilter] ? getTierIconHtml(currentFilter, p.tiers[currentFilter], false, 0) : '');

                if (!TiersHtml) return;

                const card = document.createElement('div');
                card.className = `mctiers-card ${cardRankTheme} p-5`;
                card.onclick = () => handlePlayerClick(p.id, rank);
                
                card.innerHTML = `
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="rank-box ${rankClass}"><span>${rank}</span></div>
                            <div class="relative flex-shrink-0" style="width: 52px; height: 52px;">
                                <img src="${p.pfp}" data-name="${p.name}" onerror="handleImgError(this)" class="w-full h-full rounded-2xl object-cover bg-slate-900 border border-white/[0.08] shadow-lg">
                                <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-emerald-500 border-2 border-slate-950 rounded-full shadow-md"></div>
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-extrabold text-base text-white tracking-tight truncate max-w-[160px] md:max-w-[240px]">${p.name}</h3>
                                <p class="text-xs text-slate-400 font-semibold flex items-center gap-1 mt-0.5">
                                    <span class="truncate text-slate-400/80">${p.title}</span>
                                </p>
                            </div>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <div class="pts-pill px-3.5 py-1.5 rounded-xl border text-xs font-black inline-block bg-slate-950/80 border-white/[0.05] shadow-inner tracking-tight">
                                ${p.computedPts} <span class="text-[9px] font-bold text-blue-500 ml-0.5 tracking-wider">PTS</span>
                            </div>
                            <p class="text-[9px] text-slate-500 font-black mt-2.5 uppercase tracking-widest">${p.region}</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-white/[0.04] flex gap-2 overflow-x-auto no-scrollbar">${TiersHtml}</div>
                `;
                container.appendChild(card);
            });
            
            updateDesktopProfile(selectedPlayerId, 1);
        }

        function handlePlayerClick(id, rank) {
            selectedPlayerId = id;
            if (window.innerWidth >= 1024) {
                updateDesktopProfile(id, rank);
            } else {
                openMobileProfile(id, rank);
            }
        }

        function filterBy(mode, el) {
            currentFilter = mode;
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.remove('active', 'text-white');
                t.classList.add('text-slate-400');
            });
            el.classList.add('active');
            el.classList.remove('text-slate-400');
            renderList();
        }

        function buildProfileMarkup(p, rank, rankPillColor, avatarBorder) {
            const tiersDetail = Object.entries(p.tiers).map(([mode, tier], i) => getTierIconHtml(mode, tier, true, i)).join('');
            return `
                <div class="p-6 text-center border-b border-white/[0.04] bg-slate-950/20">
                    <div class="relative inline-block mt-2 mb-4" style="width: 88px; height: 88px;">
                        <img src="${p.pfp}" data-name="${p.name}" onerror="handleImgError(this)" class="modal-avatar-frame rounded-3xl ${avatarBorder} shadow-2xl mx-auto transition-all duration-300">
                        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 ${rankPillColor} border text-[9px] px-3.5 py-1 rounded-full uppercase tracking-widest shadow-xl font-bold whitespace-nowrap">RANK #${rank}</div>
                    </div>
                    <h2 class="text-2xl font-black text-white tracking-tight mb-1 mt-2">${p.name}</h2>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-4">📍 ${p.region} Network</p>
                    <div class="inline-flex items-center bg-gradient-to-b from-slate-900 to-slate-950 border border-white/[0.06] px-5 py-2 rounded-2xl shadow-2xl">
                        <span class="text-amber-400 text-xs font-extrabold tracking-wide">🏆 ${p.title}</span>
                    </div>
                </div>
                <div class="p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-3.5">
                        <div class="bg-slate-950/60 border border-white/[0.04] rounded-2xl p-4 text-left shadow-inner">
                            <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest block mb-0.5">POSITION</span>
                            <span class="text-xl font-black text-white tracking-tight">#${rank} Place</span>
                        </div>
                        <div class="bg-slate-950/60 border border-white/[0.04] rounded-2xl p-4 text-left shadow-inner">
                            <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest block mb-0.5">NET WORTH</span>
                            <span class="text-xl font-black text-blue-400 tracking-tight">${p.computedPts} <span class="text-xs font-bold text-slate-500">PTS</span></span>
                        </div>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest pl-0.5 opacity-80 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> COMPETITIVE TIER MATRIX
                        </p>
                        <div class="grid grid-cols-4 gap-2 pb-2">${tiersDetail}</div>
                    </div>
                </div>
            `;
        }

        function getStyleConfig(rank) {
            let config = { containerClass: '', pill: 'bg-slate-900 text-slate-300 border-white/[0.08] font-bold', avatar: 'border-white/[0.08]', button: 'bg-slate-900 text-slate-400' };
            if (rank === 1) {
                config.containerClass = 'top-1';
                config.pill = 'bg-gradient-to-r from-yellow-400 via-amber-400 to-amber-500 text-slate-950 border-yellow-200 font-black';
                config.avatar = 'border-yellow-400 ring-4 ring-yellow-500/15';
                config.button = 'bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-950';
            } else if (rank === 2) {
                config.containerClass = 'top-2';
                config.pill = 'bg-gradient-to-r from-slate-100 via-slate-300 to-slate-400 text-slate-950 border-white font-black';
                config.avatar = 'border-slate-300 ring-4 ring-slate-400/15';
                config.button = 'bg-gradient-to-r from-slate-700 to-slate-800 text-white';
            } else if (rank === 3) {
                config.containerClass = 'top-3';
                config.pill = 'bg-gradient-to-r from-orange-500 to-red-600 text-white border-orange-400 font-black';
                config.avatar = 'border-orange-500 ring-4 ring-orange-600/20';
                config.button = 'bg-gradient-to-r from-orange-600 to-red-700 text-white';
            }
            return config;
        }

        function updateDesktopProfile(id, rank) {
            const p = players.find(x => x.id === id) || players[0];
            const deskCard = document.getElementById('desktopProfileCard');
            const deskBody = document.getElementById('desktopProfileBody');
            const config = getStyleConfig(rank);

            deskCard.classList.remove('desktop-top-1', 'desktop-top-2', 'desktop-top-3');
            if (config.containerClass) deskCard.classList.add(`desktop-${config.containerClass}`);
            deskBody.innerHTML = buildProfileMarkup(p, rank, config.pill, config.avatar);
        }

        function openMobileProfile(id, rank) {
            const p = players.find(x => x.id === id);
            const modal = document.getElementById('profileModal');
            const modalContainer = document.getElementById('modalContainer');
            const modalBody = document.getElementById('modalBody');
            const config = getStyleConfig(rank);

            modalContainer.classList.remove('modal-top-1', 'modal-top-2', 'modal-top-3');
            if (config.containerClass) modalContainer.classList.add(`modal-${config.containerClass}`);

            modalBody.innerHTML = buildProfileMarkup(p, rank, config.pill, config.avatar) + `
                <div class="p-6 pt-0">
                    <button onclick="closeProfile()" class="w-full py-4 ${config.button} border border-transparent rounded-2xl text-xs font-black uppercase tracking-widest transition-all">Close Data Feed</button>
                </div>
            `;
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('modal-visible'));
        }

        function closeProfile() { 
            const modal = document.getElementById('profileModal');
            modal.classList.remove('modal-visible');
            setTimeout(() => { modal.style.display = 'none'; }, 400);
        }

        /* Others Window Engine */
        function openOthersModal() {
            const modal = document.getElementById('othersModal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('modal-visible'));
        }

        function closeOthersModal() {
            const modal = document.getElementById('othersModal');
            modal.classList.remove('modal-visible');
            setTimeout(() => { modal.style.display = 'none'; }, 400);
        }

        // Run Systems
        buildLedger();
        renderList();
    </script>
</body>
</html>
